<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foto Graciela — Mi contrato</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#161513;
    --ink-2:#262420;
    --gold:#bf9b46;
    --gold-deep:#9c7c2e;
    --cream:#f1e6cd;
    --paper:#ffffff;
    --bg:#f4f2ec;
    --line:#e6e1d6;
    --text:#1d1c1a;
    --muted:#7a756c;
    --green:#2f7d4f;
    --green-bg:#e7f3eb;
    --amber:#9a7a16;
    --amber-bg:#f7eecd;
    --red:#a23a2e;
    --red-bg:#f6e6e3;
    --shadow:0 1px 2px rgba(20,18,15,.05),0 8px 24px rgba(20,18,15,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    font-size:15px;line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .shell{max-width:660px;margin:0 auto;padding:0 16px 64px;}
  /* ---------- Top bar ---------- */
  .topbar{
    background:var(--ink);
    margin:0 -16px 20px;
    padding:18px 16px 16px;
    border-bottom:3px solid var(--gold);
    position:sticky;top:0;z-index:20;
  }
  .topbar-inner{max-width:660px;margin:0 auto;display:flex;align-items:center;gap:12px;}
  .mono{
    width:42px;height:42px;border:2px solid var(--gold);border-radius:50%;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;
    color:var(--gold);font-family:'Montserrat';font-weight:800;font-size:15px;letter-spacing:.5px;
  }
  .brand h1{
    margin:0;color:#fff;font-family:'Montserrat';font-weight:800;
    font-size:16px;letter-spacing:2.5px;line-height:1.1;
  }
  .brand p{margin:1px 0 0;color:#b9b09c;font-size:10px;letter-spacing:2px;text-transform:uppercase;}
  .topbar .back{
    margin-left:auto;background:transparent;border:1px solid #4a463d;color:#e9e3d3;
    padding:7px 12px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;
  }
  .topbar .back:hover{border-color:var(--gold);color:#fff}
  /* ---------- Typography helpers ---------- */
  .eyebrow{font-family:'Montserrat';font-weight:700;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold-deep);}
  h2.page{font-family:'Montserrat';font-weight:800;font-size:24px;letter-spacing:-.3px;margin:6px 0 2px;}
  .sub{color:var(--muted);font-size:14px;margin:0 0 20px;}
  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    font-family:'Montserrat';font-weight:600;font-size:14px;letter-spacing:.3px;
    padding:13px 18px;border-radius:11px;border:1px solid transparent;cursor:pointer;
    text-decoration:none;transition:transform .04s ease, background .15s ease, border-color .15s ease;
    width:100%;
  }
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-primary:hover{background:#000}
  .btn-gold{background:var(--gold);color:#23200e;}
  .btn-gold:hover{background:var(--gold-deep);color:#fff}
  .btn-ghost{background:#fff;color:var(--text);border-color:var(--line);}
  .btn-ghost:hover{border-color:var(--gold)}
  .btn-danger{background:#fff;color:var(--red);border-color:var(--red-bg);}
  .btn-danger:hover{background:var(--red-bg)}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap}
  .btn-row .btn{width:auto;flex:1 1 auto;min-width:140px}
  .btn-sm{padding:9px 13px;font-size:13px;border-radius:9px;width:auto}
  /* ---------- Cards ---------- */
  .card{
    background:var(--paper);border:1px solid var(--line);border-radius:16px;
    padding:20px;box-shadow:var(--shadow);margin-bottom:14px;
  }
  .card.tight{padding:16px}
  .choice{
    display:flex;gap:14px;align-items:flex-start;text-align:left;cursor:pointer;width:100%;
    background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:20px;
    box-shadow:var(--shadow);transition:border-color .15s ease, transform .04s ease;font-family:inherit;
  }
  .choice:hover{border-color:var(--gold)}
  .choice:active{transform:translateY(1px)}
  .choice .ic{
    width:44px;height:44px;border-radius:12px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    background:var(--cream);color:var(--gold-deep);
  }
  .choice .ic svg{width:22px;height:22px}
  .choice h3{margin:2px 0 3px;font-family:'Montserrat';font-weight:700;font-size:16px;}
  .choice p{margin:0;color:var(--muted);font-size:13.5px;}
  /* ---------- Forms ---------- */
  .field{margin-bottom:14px}
  .field label{display:block;font-weight:600;font-size:13px;margin-bottom:6px;color:#3a382f}
  .field .hint{font-weight:400;color:var(--muted);font-size:12px}
  input[type=text],input[type=tel],input[type=number],input[type=date],input[type=time],select,textarea{
    width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;
    font-family:inherit;font-size:15px;background:#fff;color:var(--text);
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(191,155,70,.15)}
  textarea{resize:vertical;min-height:70px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media (max-width:480px){.grid2{grid-template-columns:1fr}}
  .pininput{letter-spacing:8px;text-align:center;font-size:22px;font-weight:700;font-family:'Montserrat'}
  /* ---------- Package selector ---------- */
  .pkg{
    position:relative;border:1px solid var(--line);border-radius:14px;background:#fff;
    padding:16px 16px 16px 20px;margin-bottom:12px;cursor:pointer;overflow:hidden;transition:border-color .15s ease;
  }
  .pkg:before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--gold);opacity:.5}
  .pkg:hover{border-color:var(--gold)}
  .pkg.sel{border-color:var(--ink);box-shadow:0 0 0 2px var(--ink)}
  .pkg.sel:before{opacity:1}
  .pkg-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .pkg-head .name{font-family:'Montserrat';font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:.5px}
  .pkg-badge{
    margin-left:auto;background:var(--cream);color:#5c4a14;border:1px solid #e2d2a8;
    font-family:'Montserrat';font-weight:700;font-size:13px;padding:4px 12px;border-radius:20px;white-space:nowrap;
  }
  .pkg ul{margin:0;padding-left:18px}
  .pkg li{font-size:12.5px;color:#54514a;margin:3px 0;line-height:1.4}
  .pkg .check{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto}
  .pkg.sel .check{border-color:var(--ink);background:var(--ink);position:relative}
  .pkg.sel .check:after{content:"";position:absolute;left:4px;top:1px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
  /* ---------- Tags / badges ---------- */
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:20px;font-family:'Montserrat';letter-spacing:.3px}
  .tag.green{background:var(--green-bg);color:var(--green)}
  .tag.amber{background:var(--amber-bg);color:var(--amber)}
  .tag.red{background:var(--red-bg);color:var(--red)}
  .tag.gray{background:#eceae3;color:#6c6760}
  .tag .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
  /* ---------- List rows ---------- */
  .row{
    display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;font-family:inherit;
    background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:10px;
    box-shadow:var(--shadow);transition:border-color .15s ease, transform .04s ease;
  }
  .row:hover{border-color:var(--gold)}
  .row:active{transform:translateY(1px)}
  .row .avatar{width:42px;height:42px;border-radius:11px;background:var(--ink);color:var(--gold);flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;font-family:'Montserrat';font-weight:700;font-size:15px}
  .row .meta{flex:1;min-width:0}
  .row .meta .name{font-weight:700;font-size:15px;font-family:'Montserrat';white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .meta .line{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .chev{color:#cfcabd;flex:0 0 auto}
  /* ---------- Share box / code ---------- */
  .codebox{
    background:var(--ink);border-radius:16px;padding:22px;text-align:center;color:#fff;margin-bottom:14px;
    border:1px solid #000;
  }
  .codebox .lbl{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#b9b09c;font-family:'Montserrat';font-weight:600}
  .codebox .code{font-family:'Montserrat';font-weight:800;font-size:34px;letter-spacing:4px;color:var(--gold);margin:8px 0 4px}
  .copybtn{background:var(--gold);color:#23200e;border:none;border-radius:9px;padding:8px 16px;font-family:'Montserrat';font-weight:600;font-size:13px;cursor:pointer;margin-top:8px}
  .copybtn:hover{background:#fff}
  /* ---------- Balance meter ---------- */
  .balance{background:#faf8f2;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
  .balance .nums{display:flex;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
  .balance .nums .b{flex:1;min-width:90px}
  .balance .nums .b small{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:2px}
  .balance .nums .b span{font-family:'Montserrat';font-weight:700;font-size:18px}
  .meter{height:9px;background:#e7e2d6;border-radius:6px;overflow:hidden}
  .meter i{display:block;height:100%;background:var(--gold);border-radius:6px;transition:width .4s ease}
  .meter i.full{background:var(--green)}
  /* ---------- Misc ---------- */
  .kv{display:flex;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px;gap:12px}
  .kv:last-child{border-bottom:none}
  .kv .k{color:var(--muted);flex:0 0 42%}
  .kv .v{font-weight:500;flex:1}
  .empty{text-align:center;padding:40px 16px;color:var(--muted)}
  .empty svg{width:46px;height:46px;color:#d8d2c4;margin-bottom:10px}
  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;
    box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:50;opacity:0;transition:opacity .2s, transform .2s;pointer-events:none;
    max-width:90%;text-align:center;
  }
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .sectionline{display:flex;align-items:center;gap:12px;margin:24px 0 14px}
  .sectionline span{font-family:'Montserrat';font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
  .sectionline:before,.sectionline:after{content:"";height:1px;background:var(--line);flex:1}
  .anticipo-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#faf8f2;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;font-size:13.5px}
  .anticipo-item .am{font-family:'Montserrat';font-weight:700}
  .anticipo-item .dt{color:var(--muted);margin-left:auto;font-size:12.5px}
  .anticipo-item .del{background:none;border:none;color:var(--red);cursor:pointer;font-size:18px;line-height:1;padding:0 2px}
  .note{background:var(--amber-bg);border:1px solid #ecd99a;color:#6b5410;border-radius:12px;padding:12px 14px;font-size:13px;margin-bottom:14px}
  .note strong{font-weight:700}
  .radio-pills{display:flex;gap:10px}
  .radio-pills label{flex:1;cursor:pointer}
  .radio-pills input{position:absolute;opacity:0;pointer-events:none}
  .radio-pills .pill{display:block;text-align:center;padding:13px;border:1px solid var(--line);border-radius:12px;font-family:'Montserrat';font-weight:600;font-size:14px;background:#fff;transition:all .15s}
  .radio-pills input:checked + .pill{background:var(--ink);color:#fff;border-color:var(--ink)}
  .thanks{text-align:center;padding:10px 0 6px}
  .thanks .big{width:64px;height:64px;border-radius:50%;background:var(--green-bg);color:var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
  .thanks .big svg{width:32px;height:32px}

  /* ============ PRINT SHEET ============ */
  .print-wrap{display:none}
  .sheet{
    background:#fff;color:#111;font-family:'Inter',sans-serif;
    width:100%;max-width:720px;margin:0 auto;border:1px solid var(--line);border-radius:8px;overflow:hidden;
  }
  .sheet .s-head{background:#161513;color:#fff;text-align:center;padding:18px 20px 14px;border-bottom:3px solid var(--gold)}
  .sheet .s-head .smono{width:34px;height:34px;border:2px solid var(--gold);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:var(--gold);font-family:'Montserrat';font-weight:800;font-size:12px;margin-bottom:6px}
  .sheet .s-head h2{margin:0;font-family:'Montserrat';font-weight:800;font-size:22px;letter-spacing:3px}
  .sheet .s-head p{margin:3px 0 0;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#cfc7b3}
  .sheet .s-body{padding:18px 22px 24px}
  .sheet .s-contact{text-align:center;font-size:10px;color:#444;border-bottom:1px solid #ddd;padding-bottom:10px;margin-bottom:14px;line-height:1.6}
  .s-bar{background:#161513;color:#fff;font-family:'Montserrat';font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:6px 12px;border-radius:5px;display:inline-block;margin:6px 0 10px}
  .s-field{display:flex;font-size:12.5px;border-bottom:1px dotted #bbb;padding:6px 0;gap:8px}
  .s-field .l{color:#666;font-weight:600;flex:0 0 38%}
  .s-field .v{flex:1;font-weight:500;color:#111}
  .s-row2{display:flex;gap:18px}
  .s-row2 .s-field{flex:1}
  .s-pkg{border:1px solid #ccc;border-left:5px solid var(--gold);border-radius:6px;padding:12px 14px;margin-top:6px}
  .s-pkg h4{margin:0 0 6px;font-family:'Montserrat';font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center}
  .s-pkg .pr{margin-left:auto;background:var(--cream);border:1px solid #e0d0a6;border-radius:14px;padding:2px 10px;font-size:12px}
  .s-pkg ul{margin:0;padding-left:16px}
  .s-pkg li{font-size:11px;color:#444;margin:2px 0}
  .s-totals{display:flex;gap:14px;margin-top:14px;flex-wrap:wrap}
  .s-totals .t{flex:1;min-width:120px;border:1px solid #ddd;border-radius:6px;padding:10px 12px;text-align:center}
  .s-totals .t small{display:block;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:3px}
  .s-totals .t b{font-family:'Montserrat';font-size:16px}
  .s-anti{margin-top:10px;font-size:11px}
  .s-anti table{width:100%;border-collapse:collapse}
  .s-anti td{border:1px solid #ddd;padding:5px 8px;font-size:11px}
  .s-sign{display:flex;gap:40px;margin-top:36px}
  .s-sign .sg{flex:1;text-align:center}
  .s-sign .sg .ln{border-top:1px solid #333;margin-top:34px;padding-top:6px;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px}
  .s-sign .sg .who{font-size:11px;font-weight:600;color:#111}
  .s-clauses{padding:22px}
  .s-clauses .ct{text-align:center;font-family:'Montserrat';font-weight:800;font-size:18px;letter-spacing:3px;margin:0 0 14px;border-bottom:2px solid #161513;padding-bottom:8px}
  .s-clauses ol{margin:0;padding-left:20px}
  .s-clauses li{font-size:10.5px;color:#333;margin-bottom:8px;line-height:1.45}
  .s-foot{text-align:center;font-size:10px;color:#555;font-style:italic;border-top:1px solid #161513;margin-top:14px;padding-top:10px}

  @media print{
    @page{size:letter;margin:12mm}
    body{background:#fff}
    .no-print{display:none !important}
    .shell{max-width:none;padding:0}
    .print-wrap{display:block !important}
    .sheet{border:none;border-radius:0;max-width:none}
    .sheet .s-head,.s-bar,.s-pkg,.s-totals .t b,.print-page2{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .print-page2{page-break-before:always}
    .sheet,.print-page2{box-shadow:none}
  }

  /* ---------- Logo ---------- */
  .logo-img{height:40px;width:auto;display:block;flex:0 0 auto}
  @media(max-width:430px){.logo-img{height:33px}}
  .sheet .s-head .logo-sheet{height:82px;width:auto;display:inline-block;margin:0 auto 5px}
</style>
</head>

/* ---------- Almacenamiento de bajo nivel ---------- */
function safeParse(v){ try{ return JSON.parse(v); }catch(e){ return null; } }
const memFallback = {};
const hasStore = (typeof window!=='undefined' && window.storage && typeof window.storage.set==='function');
async function sSet(k,v){ if(hasStore){ try{ await window.storage.set(k,v,true); return; }catch(e){} } memFallback[k]=v; }
async function sGet(k){ if(hasStore){ try{ const r=await window.storage.get(k,true); return r?r.value:null; }catch(e){ return (k in memFallback)?memFallback[k]:null; } } return (k in memFallback)?memFallback[k]:null; }
async function sDel(k){ if(hasStore){ try{ await window.storage.delete(k,true); return; }catch(e){} } delete memFallback[k]; }
async function sList(p){ if(hasStore){ try{ const r=await window.storage.list(p,true); return r?r.keys:[]; }catch(e){} } return Object.keys(memFallback).filter(x=>x.startsWith(p)); }

/* ---------- Conexión con Google (Apps Script) ---------- */
async function apiPost(payload){
  let res;
  try{ res = await fetch(BACKEND_URL, { method:'POST', body: JSON.stringify(payload) }); }
  catch(e){ throw new Error('conexion'); }
  let data;
  try{ data = await res.json(); }catch(e){ throw new Error('respuesta'); }
  if(data && data.error) throw new Error(data.error);
  return data;
}

/* ---------- Utilidades ---------- */
function genCode(){ const ch='ABCDEFGHJKMNPQRSTUVWXYZ23456789'; let s=''; for(let i=0;i<4;i++) s+=ch[Math.floor(Math.random()*ch.length)]; return 'FG-'+s; }
function money(n){ n=Number(n)||0; return '$'+n.toLocaleString('es-MX'); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function abonado(c){ return (c.anticipos||[]).reduce((s,a)=>s+(Number(a.monto)||0),0); }
function saldo(c){ return (Number(c.costoTotal)||0)-abonado(c); }
function payTag(c){ const s=saldo(c); if((Number(c.costoTotal)||0)>0 && s<=0) return '<span class="tag green"><span class="dot"></span>Pagado</span>'; if(abonado(c)>0) return '<span class="tag amber"><span class="dot"></span>Con anticipo</span>'; return '<span class="tag gray"><span class="dot"></span>Sin pago</span>'; }
function fillTag(c){ return c.filled?'<span class="tag green"><span class="dot"></span>Llenado</span>':'<span class="tag amber"><span class="dot"></span>Pendiente</span>'; }
function fmtDate(d){ if(!d) return '—'; const p=String(d).split('-'); if(p.length===3) return p[2]+'/'+p[1]+'/'+p[0]; return d; }
function today(){ return new Date().toISOString().slice(0,10); }
function initials(n){ if(!n) return '?'; const w=n.trim().split(/\s+/); return ((w[0]||'')[0]||'').toUpperCase()+((w[1]||'')[0]||'').toUpperCase(); }

/* ---------- Almacenamiento (solo lectura/llenado del propio contrato) ---------- */

      <div class="kv"><div class="k">Tipo de evento</div><div class="v">${esc(c.tipoEvento)||'—'}</div></div>
      <div class="kv"><div class="k">Fecha</div><div class="v">${fmtDate(c.fechaEvento)}</div></div>
      <div class="kv"><div class="k">Horario</div><div class="v">${esc(c.horaInicio)||'—'} a ${esc(c.horaTermino)||'—'}</div></div>
      <div class="kv"><div class="k">Iglesia / Templo</div><div class="v">${esc(c.iglesiaTemplo)||'—'}</div></div>
      <div class="kv"><div class="k">Salón / Jardín</div><div class="v">${esc(c.salonJardin)||'—'}</div></div>
    </div>
    <button class="btn btn-primary" data-act="print" data-code="${esc(c.code)}" style="margin-top:6px">${IC.print} Imprimir / Guardar PDF</button>
    <button class="btn btn-ghost" data-act="editClient" data-code="${esc(c.code)}" style="margin-top:10px">${IC.edit} Corregir mis datos</button>
  `;
  bind();
}

async function onAction(e){
  const el=e.currentTarget, act=el.getAttribute('data-act'), code=el.getAttribute('data-code');
  switch(act){
    case 'loadCode': await doLoadCode(); break;
    case 'saveFormClient': await doSaveForm(false); break;
    case 'refreshClient': go('clientView', code); toast('Actualizado'); break;
    case 'editClient': go('clientForm', code); break;
    case 'print': go('print', code); break;
    case 'doPrint': window.print(); break;
    case 'closePrint': document.getElementById('printArea').innerHTML=''; go('clientView', S.code); break;
  }
}

backBtn.addEventListener('click',()=>go('clientEntry'));
S.view='clientEntry';
render();

</script>
</body>
</html>
